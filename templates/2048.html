<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #faf8ef;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
        }
        .grid-item {
            width: 100px;
            height: 100px;
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item">2</div>
        <div class="grid-item">4</div>
        <div class="grid-item">8</div>
        <div class="grid-item">16</div>
        <div class="grid-item">32</div>
        <div class="grid-item">64</div>
        <div class="grid-item">128</div>
        <div class="grid-item">256</div>
        <div class="grid-item">512</div>
        <div class="grid-item">1024</div>
        <div class="grid-item">2048</div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
    </div>
    <script>
        // Add your JavaScript game logic here
    </script>
</body>
</html>
