<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Card Flip Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom, #FFB347, #FFCC33);
            font-family: 'Arial', sans-serif;
        }
        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            gap: 10px;
        }
        .card {
            width: 150px;
            height: 200px;
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 2px solid #fff;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
        }
        .card-front {
            background: rgba(255, 255, 255, 0.8);
        }
        .card-back {
            background: #FF7854;
            transform: rotateY(180deg);
        }
        .message {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="message">Memory Match Game</div>
    <div class="game-container">
        <!-- Cards will be generated here -->
    </div>
    <script>
        const cards = [
            'A', 'A', 'B', 'B',
            'C', 'C', 'D', 'D',
            'E', 'E', 'F', 'F',
            'G', 'G', 'H', 'H'
        ];
        let cardValues = [];
        const gameContainer = document.querySelector('.game-container');
        cards.sort(() => 0.5 - Math.random()).forEach(value => {
            const cardElement = document.createElement('div');
            cardElement.classList.add('card');
            cardElement.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">?</div>
                    <div class="card-back">${value}</div>
                </div>
            `;
            cardElement.addEventListener('click', () => flipCard(cardElement, value));
            gameContainer.appendChild(cardElement);
        });
        let flippedCards = [];
        function flipCard(cardElement, value) {
            if (flippedCards.length < 2 && !cardElement.classList.contains('flipped')) {
                cardElement.classList.add('flipped');
                flippedCards.push({ cardElement, value });
                if (flippedCards.length === 2) {
                    setTimeout(checkMatch, 1000);
                }
            }
        }
        function checkMatch() {
            const [firstCard, secondCard] = flippedCards;
            if (firstCard.value === secondCard.value) {
                firstCard.cardElement.removeEventListener('click', flipCard);
                secondCard.cardElement.removeEventListener('click', flipCard);
            } else {
                firstCard.cardElement.classList.remove('flipped');
                secondCard.cardElement.classList.remove('flipped');
            }
            flippedCards = [];
        }
    </script>
</body>
</html>
