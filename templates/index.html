<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .game-portal {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .game {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            width: 80%;
            max-width: 600px;
            text-align: center;
        }
        a {
            color: #bb86fc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Game Portal</h1>
    <div class="game-portal">
        <div class="game"><a href="/path/to/2048">Play 2048</a></div>
        <div class="game"><a href="/path/to/snake">Play Snake</a></div>
        <div class="game"><a href="/path/to/tic-tac-toe">Play Tic-Tac-Toe</a></div>
        <div class="game"><a href="/path/to/memory-match">Play Memory Match</a></div>
    </div>
    <h2>Links Portal</h2>
    <div class="links-portal">
        <p style="text-align: center;">
            <a href="#">Link 1</a><br>
            <a href="#">Link 2</a><br>
            <a href="#">Link 3</a>
        </p>
    </div>
</body>
</html>
